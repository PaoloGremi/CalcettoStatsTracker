name: calcetto_tracker
description: App per registrare risultati di calcetto e voti giocatori (Hive - locale)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.0.5
  uuid: ^3.0.7
  intl: ^0.20.2
  image_picker: ^1.1.2        # selezione foto dalla galleria
  path_provider: ^2.1.4       # cartella documenti dell'app
  path: ^1.9.0                # utilità per manipolare path di file

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^1.1.0
  build_runner: ^2.3.3
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/shields/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
